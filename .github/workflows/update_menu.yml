name: Update Lunch Menu
on:
  schedule:
    - cron: '17 3 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip' 
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run scraper
        run: python fetch_menu.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add menu.json
          # Kontrola, zda se něco změnilo, aby commit neházel chybu
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily menu" && git push)
