<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch | Krebs Laboratories</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .copy-card:active { transform: scale(1); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12">
            <a href="/home/" class="text-blue-600 hover:underline text-sm mb-4 inline-block">← Return home</a>
            <h1 class="text-4xl font-bold tracking-tight">Lunch Menu</h1>
            <p class="text-xl text-gray-600 font-light">Options near the offices</p>
        </header>

        <section class="space-y-8">
            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Masný růžek</h2>
                <div id="menu-content" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-400 animate-pulse">Loading...</p>
                </div>
            </div>
        </section>

        <script>
           async function loadTodayMenu() {
    const container = document.getElementById('menu-content');
    const targetUrl = 'https://www.pivnicemasnyruzek.cz/menu-dne';
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, 'text/html');

        // Najdeme přímo span s třídou "dnes"
        const todaySpan = doc.querySelector('span.dnes');
        let todayTable = null;

        if (todaySpan) {
            // Tabulka následuje hned po nadpisu h2, ve kterém je ten span
            todayTable = todaySpan.closest('h2').nextElementSibling;
        }

        if (todayTable && todayTable.tagName === 'TABLE') {
            container.innerHTML = '';
            
            const tableWrapper = document.createElement('div');
            tableWrapper.className = "overflow-hidden border-t border-gray-100";
            
            // Pročištění a stylování řádků
            todayTable.querySelectorAll('tr').forEach(tr => {
                tr.className = "border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors flex justify-between items-center";
                
                // Vyndáme buňky a upravíme jejich obsah
                const cells = tr.querySelectorAll('td');
                if (cells.length >= 2) {
                    const foodCell = cells[cells.length - 2]; // Předposlední je jídlo
                    const priceCell = cells[cells.length - 1]; // Poslední je cena

                    // Vyčistíme text od &nbsp; a přebytečných mezer
                    const foodText = foodCell.textContent.replace(/\s+/g, ' ').trim();
                    const priceText = priceCell.textContent.trim();

                    tr.innerHTML = `
                        <td class="py-3 pr-4 text-gray-800 text-sm">${foodText}</td>
                        <td class="py-3 text-right font-medium text-blue-600 whitespace-nowrap text-sm">${priceText}</td>
                    `;
                    tableWrapper.appendChild(tr);
                }
            });

            container.appendChild(tableWrapper);
        } else {
            container.innerHTML = `<p class="text-gray-500 italic">Dnešní menu nenalezeno... <br> <a href="${targetUrl}" target="_blank" class="text-blue-500 not-italic">Zkus web restaurace →</a></p>`;
        }

    } catch (error) {
        container.innerHTML = `<p class="text-gray-500 italic">Chyba při načítání. <br> <a href="${targetUrl}" target="_blank" class="text-blue-500 not-italic">Zkus web restaurace →</a></p>`;
        console.error('Fetch error:', error);
    }
}

loadTodayMenu();
</script>


                
        <footer class="mt-20 pt-8 border-t border-gray-200 text-center text-gray-400 text-xs">
            © 2026 Built & Maintained by Martin Krebs.  <br>
            Experimental Web Lab • Thank you, Tailwind CSS.
        </footer>
    </div>
</body>
