<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch | Krebs Laboratories</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .copy-card:active { transform: scale(1); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12">
            <a href="/home/" class="text-blue-600 hover:underline text-sm mb-4 inline-block">← Return home</a>
            <h1 class="text-4xl font-bold tracking-tight">Lunch Menu</h1>
            <p class="text-xl text-gray-600 font-light">Options near the offices</p>
        </header>

        <section class="space-y-8">
            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Masný růžek</h2>
                <div id="menu-content" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-400 animate-pulse">Loading...</p>
                </div>
            </div>
        </section>

        <script>
           async function loadTodayMenu() {
    const container = document.getElementById('menu-content');
    // Použijeme přímo URL z iframe Menicka.cz
    const targetUrl = 'https://www.menicka.cz/api/iframe/?id=6956';
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, 'text/html');

        // Menicka.cz dává dnešní menu do divu s třídou "menicka" 
        // a první výskyt je obvykle aktuální den
        const todayMenu = doc.querySelector('.menicka');

        if (todayMenu) {
            container.innerHTML = '';
            const tableWrapper = document.createElement('div');
            tableWrapper.className = "overflow-hidden border-t border-gray-100";

            // Najdeme všechny řádky s jídlem (li)
            const items = todayMenu.querySelectorAll('li');
            
            items.forEach(li => {
                const foodName = li.querySelector('.nabidka')?.textContent.trim();
                const price = li.querySelector('.cena')?.textContent.trim();

                if (foodName) {
                    const row = document.createElement('div');
                    row.className = "py-3 border-b border-gray-50 last:border-0 flex justify-between items-center hover:bg-gray-50 transition-colors";
                    
                    row.innerHTML = `
                        <span class="text-gray-800 text-sm pr-4">${foodName}</span>
                        <span class="font-medium text-blue-600 whitespace-nowrap text-sm">${price || ''}</span>
                    `;
                    tableWrapper.appendChild(row);
                }
            });

            container.appendChild(tableWrapper);
        } else {
            throw new Error('Menu nenalezeno');
        }

    } catch (error) {
        container.innerHTML = `<p class="text-gray-500 italic">Dnešní menu nenalezeno nebo nastala chyba. <br> <a href="${targetUrl}" target="_blank" class="text-blue-500 not-italic underline">Zobrazit na Menicka.cz →</a></p>`;
        console.error('Fetch error:', error);
    }
}
</script>


                
        <footer class="mt-20 pt-8 border-t border-gray-200 text-center text-gray-400 text-xs">
            © 2026 Built & Maintained by Martin Krebs.  <br>
            Experimental Web Lab • Thank you, Tailwind CSS.
        </footer>
    </div>
</body>
