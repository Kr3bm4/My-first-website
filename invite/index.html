<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucie a Martin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>

<body class="bg-stone-50 text-stone-800 font-['Inter'] antialiased">

    <main class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-white shadow-xl rounded-2xl overflow-hidden border border-stone-100">
            
            <div class="p-10 text-center border-b border-stone-100">
                <span class="uppercase tracking-[0.3em] text-sm text-stone-400 font-semibold">Budeme se brát</span>
                <h1 class="text-5xl md:text-6xl font-light mt-6 mb-2 text-stone-900">Lucie <span class="text-stone-300">&</span> Martin</h1>
                <p class="text-lg text-stone-500 italic mt-4">Bude nám ctí, když tento den oslavíte s námi.</p>
            </div>

            <div class="grid md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-stone-100 bg-stone-50/50">
                <div class="p-8 text-center">
                    <h3 class="uppercase tracking-widest text-xs font-bold text-stone-400 mb-3">Kdy</h3>
                    <p class="text-xl font-semibold text-stone-700">20. června 2026</p>
                    <p class="text-stone-500">v 11:00 hodin</p>
                </div>
                <div class="p-8 text-center">
                    <h3 class="uppercase tracking-widest text-xs font-bold text-stone-400 mb-3">Kde</h3>
                    <p class="text-xl font-semibold text-stone-700">Zámek Slavkov</p>
                    <p class="text-stone-500">Slavkov u Brna</p>
                </div>
            </div>

            <div class="p-10 text-center bg-white">
                <h2 class="text-2xl font-light mb-6">Potvrďte prosím svou účast</h2>
                <form class="space-y-4 max-w-sm mx-auto">
                    <input type="text" placeholder="Vaše jméno" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-200 transition-all">
                    
                    <select class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-200 transition-all bg-white">
                        <option>Přijdu s radostí</option>
                        <option>Bohužel se nemohu zúčastnit</option>
                    </select>

                    <button type="submit" class="w-full bg-stone-800 text-white py-3 rounded-lg font-semibold hover:bg-stone-700 transition-colors shadow-lg shadow-stone-200">
                        Odeslat odpověď
                    </button>
                </form>
            </div>

            <div class="p-6 bg-stone-50 text-center border-t border-stone-100">
                <p class="text-sm text-stone-400">Těšíme se na vás!</p>
            </div>
        </div>
    </main>

</body>
</html>
