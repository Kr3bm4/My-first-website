<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML | Krebs Laboratories </title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        textarea, iframe { width: 35%; height: 100%; border: none; padding: 10px; box-sizing: border-box; }
        textarea { background: #1e1e1e; color: #d4d4d4; font-family: monospace; outline: none; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body>

    <textarea id="Input" placeholder="Your HTML goes here... (to go back you have to edit the URL)"></textarea>

    <iframe id="Output"></iframe>

    <script>
        const Input = document.getElementById('Input');
        const Output = document.getElementById('Output').contentWindow.document;

        Input.addEventListener('keyup', () => {
            Output.open();
            Output.write(Input.value);
            Output.close();
        });
    </script>
</body>
</html>
