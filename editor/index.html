<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML | Krebs Laboratories</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .editor-container { height: calc(100vh - 180px); }
        .copy-card:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed flex flex-col h-screen">

    <div class="max-w-7xl mx-auto px-6 py-8 w-full">
        <header>
            <a href="/home/" class="text-blue-600 hover:underline text-sm mb-2 inline-block">← Return home</a>
            <h1 class="text-4xl font-bold tracking-tight">Live HTML Editor</h1>
        </header>
    </div>

    <main class="flex-1 px-6 pb-8">
        <div class="flex flex-row gap-4 h-full editor-container">
            
            <textarea id="Input" 
                class="w-1/3 h-full p-4 font-mono text-sm bg-gray-900 text-blue-300 rounded-xl shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                placeholder="Your HTML goes here..."></textarea>

            <div class="w-2/3 h-full bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                <iframe id="Output" class="w-full h-full"></iframe>
            </div>

        </div>
    </main>

    <script>
        const input = document.getElementById('Input');
        const output = document.getElementById('Output').contentWindow.document;

        input.addEventListener('keyup', () => {
            output.open();
            output.write(input.value);
            output.close();
        });
    </script>
</body>
</html>
