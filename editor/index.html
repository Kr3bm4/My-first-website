<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML | Krebs Laboratories </title>
    <style>
        body {display: flex; height: 100vh; margin: 0; font-family: sans-serif;}
        textarea {width: 35%; height: 100%; border: none; padding: 10px; box-sizing: border-box; background: #1e1e1e; color: white;font-family: monospace; outline: none;}
        iframe {width: 65%; height: 100%; border: none; padding: 10px; box-sizing: border-box; background: white;}
    </style>
</head>
<body>

    <textarea id="Input" placeholder="Your HTML goes here... (to go back you have to edit the URL)"></textarea>

    <iframe id="Output"></iframe>

    <script>
        const Input = document.getElementById('Input');
        const Output = document.getElementById('Output').contentWindow.document;

        Input.addEventListener('keyup', () => {
            Output.open();
            Output.write(Input.value);
            Output.close();
        });
    </script>
</body>
</html>
