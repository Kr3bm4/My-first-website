<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live HTML | Krebs Laboratories</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/nord.min.css">

    <style>
        .editor-container { height: calc(100vh - 180px); }
        .CodeMirror { height: 100%; border-radius: 0.75rem; font-family: 'Fira Code', monospace; font-size: 14px; }
        .copy-card:active { transform: scale(1); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed flex flex-col h-screen">

    <div class="max-w-7xl mx-auto px-6 py-8 w-full">
        <header>
            <a href="/home/" class="text-blue-600 hover:underline text-sm mb-2 inline-block">← Return home</a>
            <h1 class="text-4xl font-bold tracking-tight">Live HTML Editor</h1>
        </header>
    </div>

    <main class="flex-1 px-6 pb-8">
        <div class="flex flex-row gap-4 h-full editor-container">
            
            <div class="w-1/3 h-full shadow-lg overflow-hidden rounded-xl">
                <textarea id="Input">Your HTML goes here...</textarea>
            </div>

            <div class="w-2/3 h-full bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                <iframe id="Output" class="w-full h-full"></iframe>
            </div>

        </div>
    </main>

    <footer class="pt-8 border-t border-gray-200 text-center text-gray-400 text-xs">
            © 2026 Built & Maintained by Martin Krebs.  <br>
            Experimental Web Lab • Thank you, Tailwind CSS.
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script>
        const inputArea = document.getElementById('Input');
        const outputFrame = document.getElementById('Output').contentWindow.document;
        const editor = CodeMirror.fromTextArea(inputArea, {
            mode: "htmlmixed",
            theme: "nord", 
            lineNumbers: true,
            tabSize: 4,
            lineWrapping: true
        });
        function updatePreview() {
            const code = editor.getValue();
            outputFrame.open();
            outputFrame.write(code);
            outputFrame.close();
        }
        editor.on('change', updatePreview);
        
        updatePreview();
    </script>
</body>
</html>
