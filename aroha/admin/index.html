<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Admin | Aroha Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-xl font-bold mb-4">Editace denního menu</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium">GitHub Token (Heslo)</label>
                <input type="password" id="ghToken" class="w-full border p-2 rounded" placeholder="ghp_xxx...">
            </div>
            <hr>
            <div>
                <label class="block text-sm">Polévka</label>
                <input type="text" id="polevka" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-sm">Hlavní jídlo 1</label>
                <input type="text" id="jidlo1" class="w-full border p-2 rounded">
                <input type="number" id="cena1" class="w-full border p-2 rounded mt-1" placeholder="Cena">
            </div>
            <button onclick="saveMenu()" id="saveBtn" class="w-full bg-green-600 text-white py-2 rounded font-bold">
                Uložit a publikovat
            </button>
            <p id="status" class="text-sm text-center mt-2"></p>
        </div>
    </div>

    <script>
        const OWNER = 'TVOJE_GITHUB_JMENO';
        const REPO = 'NAZEV_REPOZITARE';
        const PATH = 'aroha/aroha.json'; // Cesta k souboru v repu

        async function saveMenu() {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('status');

            if(!token) return alert('Zadej token!');

            btn.disabled = true;
            status.innerText = 'Pracuji na tom...';

            try {
                // 1. Musíme získat SHA souboru (GitHub to vyžaduje pro update)
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
                const data = await res.json();
                const sha = data.sha;

                // 2. Připravíme nová data
                const newContent = {
                    polevka: document.getElementById('polevka').value,
                    jidlo1: document.getElementById('jidlo1').value,
                    cena1: document.getElementById('cena1').value
                    // ...atd
                };

                // 3. Pošleme update na GitHub
                const updateRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: "Aktualizace menu přes admin",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2)))),
                        sha: sha
                    })
                });

                if(updateRes.ok) {
                    status.innerText = '✅ Menu uloženo! Projeví se za cca 1-2 minuty.';
                } else {
                    status.innerText = '❌ Chyba při ukládání.';
                }
            } catch (err) {
                status.innerText = '❌ Došlo k chybě: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
