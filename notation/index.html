<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notation | Krebs Laboratories</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .copy-card:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12">
            <a href="/home/" class="text-blue-600 hover:underline text-sm mb-4 inline-block">← Return home</a>
            <h1 class="text-4xl font-bold tracking-tight">Notation & Symbols</h1>
        </header>

        <section class="space-y-8">
            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Superscripts | Numbers</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="copyToClipboard('⁰')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁰</button>
                    <button onclick="copyToClipboard('¹')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">¹</button>
                    <button onclick="copyToClipboard('²')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">²</button>
                    <button onclick="copyToClipboard('³')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">³</button>
                    <button onclick="copyToClipboard('⁴')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁴</button>
                    <button onclick="copyToClipboard('⁵')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁵</button>
                    <button onclick="copyToClipboard('⁶')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁶</button>
                    <button onclick="copyToClipboard('⁷')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁷</button>
                    <button onclick="copyToClipboard('⁸')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁸</button>
                    <button onclick="copyToClipboard('⁹')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁹</button>
                </div>
            </div>

            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Superscripts | Symbols</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="copyToClipboard('⁺')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁺</button>
                    <button onclick="copyToClipboard('⁻')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁻</button>
                    <button onclick="copyToClipboard('ˣ')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">ˣ</button>
                    <button onclick="copyToClipboard('⁼')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁼</button>
                    <button onclick="copyToClipboard('⁽')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁽</button>
                    <button onclick="copyToClipboard('⁾')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">⁾</button>
                    <button onclick="copyToClipboard('ᐟ')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">ᐟ</button>
                    <button onclick="copyToClipboard('ꜝ')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">ꜝ</button>
                    <button onclick="copyToClipboard('ᵊ')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">ᵊ</button>
                    
                </div>
            </div>

            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Subscripts | Numbers</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="copyToClipboard('₀')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₀</button>
                    <button onclick="copyToClipboard('₁')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₁</button>
                    <button onclick="copyToClipboard('₂')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₂</button>
                    <button onclick="copyToClipboard('₃')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₃</button>
                    <button onclick="copyToClipboard('₄')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₄</button>
                    <button onclick="copyToClipboard('₅')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₅</button>
                    <button onclick="copyToClipboard('₆')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₆</button>
                    <button onclick="copyToClipboard('₇')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₇</button>
                    <button onclick="copyToClipboard('₈')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₈</button>
                    <button onclick="copyToClipboard('₉')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₉</button>
                </div>
            </div>

            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Subscript | Symbols</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="copyToClipboard('₊')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₊</button>
                    <button onclick="copyToClipboard('₋')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₋</button>
                    <button onclick="copyToClipboard('ₓ')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">ₓ</button>
                    <button onclick="copyToClipboard('₌')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₌</button>
                    <button onclick="copyToClipboard('₍')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₍</button>
                    <button onclick="copyToClipboard('₎')" class="copy-card px-4 py-2 bg-white border border-gray-200 rounded hover:bg-blue-50">₎</button>
                </div>
            </div>
        </section>

        <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded text-sm opacity-0 transition-opacity pointer-events-none">
            Copied to clipboard!
        </div>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 1500);
            });
        }
    </script>
</body>
